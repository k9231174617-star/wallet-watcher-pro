name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  ANDROID_SDK_VERSION: '34'
  NODE_VERSION: '20'

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      # Checkout to workspace root (no working-directory here!)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: .
      
      # Setup Java
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'gradle'
      
      # Setup Node.js
      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: wallet-watcher-pro/package-lock.json
      
      # Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_SDK_VERSION }}
          ndk-version: r26c
          build-tools-version: '34.0.0'
          emulator: false
      
      # Cache Gradle
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('wallet-watcher-pro/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      # Install npm dependencies
      - name: Install npm dependencies
        run: npm ci --legacy-peer-deps
        working-directory: wallet-watcher-pro
      
      # Capacitor sync
      - name: Capacitor sync
        run: npx cap sync android
        working-directory: wallet-watcher-pro
      
      # Build Debug APK
      - name: Build Debug APK
        if: github.event.inputs.build_type != 'release'
        run: |
          chmod +x android/gradlew
          bash android/gradlew assembleDebug --no-daemon --stacktrace
        working-directory: wallet-watcher-pro
      
      # Build Release APK
      - name: Build Release APK
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v')
        run: |
          chmod +x android/gradlew
          bash android/gradlew assembleRelease --no-daemon --stacktrace
        working-directory: wallet-watcher-pro
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_ALIAS_PASSWORD: ${{ secrets.SIGNING_KEY_ALIAS_PASSWORD }}
      
      # Upload Debug APK
      - name: Upload Debug APK
        if: github.event.inputs.build_type != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: wallet-watcher-debug-apk
          path: wallet-watcher-pro/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
      
      # Upload Release APK
      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: wallet-watcher-release-apk
          path: wallet-watcher-pro/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
      
      # Upload Release AAB (for Play Store)
      - name: Upload Release AAB
        if: github.event.inputs.build_type == 'release' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: wallet-watcher-release-aab
          path: wallet-watcher-pro/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
      
      # Create Release
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') && github.event.inputs.build_type == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            wallet-watcher-pro/android/app/build/outputs/apk/release/app-release.apk
            wallet-watcher-pro/android/app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Lint check - runs in parallel
  lint-android:
    name: Android Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: .
      
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_SDK_VERSION }}
      
      - name: Run Lint
        run: |
          chmod +x wallet-watcher-pro/android/gradlew
          bash wallet-watcher-pro/android/gradlew lintDebug --no-daemon
      
      - name: Upload Lint Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-results
          path: wallet-watcher-pro/android/app/build/reports/lint-results-debug.html

  # Test - runs in parallel (optional, only on PRs)
  test-android:
    name: Android Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          path: .
      
      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.ANDROID_SDK_VERSION }}
          emulator: true
          arch: x86_64
          ndk-version: r26c
      
      - name: Start Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.ANDROID_SDK_VERSION }}
          arch: x86_64
          force-avd-creation: true
      
      - name: Run Unit Tests
        run: |
          chmod +x wallet-watcher-pro/android/gradlew
          bash wallet-watcher-pro/android/gradlew testDebugUnitTest --no-daemon
      
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: wallet-watcher-pro/android/app/build/reports/tests/
